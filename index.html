<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tact's Idle Feast: Persistent</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { background-color: #1a1a1a; color: #eee; font-family: 'Courier New', Courier, monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 5px; overflow: hidden; transition: background-color 0.3s; }
        .game-container { background: #2d2d2d; padding: 12px; border-radius: 15px; width: 400px; text-align: center; border: 4px solid #444; display: flex; flex-direction: column; gap: 6px; position: relative; transition: 0.3s; }
        
        /* SAVE ANIMATION */
        #save-indicator {
            font-size: 0.6rem;
            color: #00ffcc;
            opacity: 0;
            transition: 0.5s;
            margin-left: 5px;
            font-weight: normal;
        }
        .saving { opacity: 1 !important; transform: translateY(-2px); }

        /* SUGAR RUSH EFFECTS */
        .sugar-rush-active { background-color: #2b002b !important; }
        .sugar-rush-active .game-container { border-color: #ff00ff !important; box-shadow: 0 0 20px #ff00ff; }
        #rush-timer { display: none; color: #ff00ff; font-weight: bold; font-size: 0.9rem; animation: blink 0.5s infinite; margin-bottom: 4px; }
        .rush-power-text { color: #ff00ff !important; text-shadow: 0 0 10px #ff00ff; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        #alert-popup { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); background: #ff0000; color: white; padding: 10px 20px; border-radius: 10px; font-size: 0.8rem; font-weight: bold; border: 2px solid white; z-index: 1000; width: 80%; display: none; pointer-events: none; }
        #stats-modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); border-radius: 12px; z-index: 2000; display: none; flex-direction: column; padding: 20px; box-sizing: border-box; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; text-align: left; font-size: 0.7rem; margin-top: 10px; }
        .stat-box { background: #222; padding: 8px; border: 1px solid #444; border-radius: 6px; }
        .stat-box b { color: #00ffcc; display: block; font-size: 0.85rem; }

        .xp-container { background: #111; padding: 6px; border-radius: 8px; border: 1px solid #333; }
        .xp-header { display: flex; justify-content: space-between; font-size: 0.7rem; color: #00ffcc; font-weight: bold; align-items: center; }
        .xp-bar { width: 100%; height: 10px; background: #000; border-radius: 5px; margin-top: 4px; overflow: hidden; border: 1px solid #444; }
        #xp-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #0066ff, #00ffcc); transition: width 0.3s; }
        .dashboard { background: #111; padding: 8px; border-radius: 10px; border: 1px solid #555; display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 4px; text-align: left; }
        .dash-item { font-size: 0.5rem; color: #888; }
        .dash-item b { display: block; color: #ffcc00; font-size: 0.75rem; }

        .auto-panel { background: #222; padding: 6px; border-radius: 8px; border: 1px solid #444; display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .auto-btn { padding: 4px; font-size: 0.55rem; background: #333; color: #00ff00; border: 1px solid #00ff00; border-radius: 4px; cursor: pointer; height: 50px; transition: 0.3s; line-height: 1.2; }
        .toggle-active { background: #00ff00 !important; color: #000 !important; font-weight: bold; }
        .toggle-off { background: #442222 !important; color: #ffaaaa !important; border-color: #ff5555 !important; }
        .global-upgrades { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .global-upgrades button { padding: 8px; font-size: 0.65rem; background: #222; border-radius: 6px; cursor: pointer; font-family: inherit; font-weight: bold; transition: 0.3s; }
        
        .food-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .food-card { background: #333; padding: 6px; border-radius: 10px; border: 1px solid #444; position: relative; }
        .food-header { display: flex; justify-content: space-between; font-size: 0.6rem; font-weight: bold; margin-bottom: 2px; align-items: center; color: #aaa; }
        .hp-bar { width: 100%; height: 55px; background: #000; border-radius: 6px; cursor: pointer; border: 1px solid #555; overflow: hidden; position: relative; }
        .hp-fill { position: absolute; top: 0; left: 0; height: 100%; width: 100%; z-index: 1; opacity: 0.85; transition: width 0.1s linear; }
        .reward-overlay { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 5; pointer-events: none; }
        .reward-val { font-size: 0.85rem; font-weight: bold; text-shadow: 2px 2px 3px #000; color: #fff; }
        .hp-num { font-size: 0.55rem; color: #fff; opacity: 0.9; font-weight: bold; text-shadow: 1px 1px 2px #000; }
        .dish-up-btn { padding: 4px; font-size: 0.55rem; background: #222; color: #0f0; border: 1px solid #0f0; border-radius: 4px; width: 100%; margin-top: 4px; cursor: pointer; }
        .footer-btn { padding: 6px; background: #444; color: #fff; border: none; border-radius: 4px; font-size: 0.6rem; cursor: pointer; font-family: inherit; margin-top: 2px; }

        .click-particle { position: fixed; font-size: 1.5rem; pointer-events: none; z-index: 10000; animation: particleFloat 1s ease-out forwards; }
        @keyframes particleFloat { 0% { transform: translate(-50%, -50%) scale(1); opacity: 1; } 100% { transform: translate(-50%, -150px) scale(1.5) rotate(20deg); opacity: 0; } }
        .floating-emoji { position: fixed; bottom: -50px; font-size: 2rem; pointer-events: none; z-index: 9999; animation: milestoneFloat 2.5s linear forwards; }
        @keyframes milestoneFloat { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; } }
    </style>
</head>
<body id="game-body">

<div class="game-container">
    <div id="alert-popup">⚠️ NEED MORE CALORIES!</div>
    <div id="rush-timer">🍭 SUGAR RUSH: <span id="rush-sec">10</span>s (5x POWER!)</div>

    <div id="stats-modal">
        <h2 style="color:#00ffcc; margin:0 0 10px 0; font-size: 1.2rem;">📊 LIVE STATS</h2>
        <div class="stats-grid">
            <div class="stat-box">LIFETIME CALS<b id="stat-life-cals">0</b></div>
            <div class="stat-box">MANUAL TAPS<b id="stat-manual-taps">0</b></div>
            <div class="stat-box">AUTO BITES<b id="stat-auto-bites">0</b></div>
            <div class="stat-box">LEVEL UPS<b id="stat-level-ups">0</b></div>
        </div>
        <h3 style="color:#ffcc00; font-size: 0.8rem; margin: 15px 0 5px 0;">DISHES FINISHED:</h3>
        <div class="stats-grid" id="dish-stats-container"></div>
        <button class="footer-btn" style="margin-top: auto; background: #ff4444;" onclick="toggleStats()">CLOSE MENU</button>
        <button class="footer-btn" style="background: #333;" onclick="hardReset()">⚠️ HARD RESET SAVE</button>
    </div>

    <div class="xp-container">
        <div class="xp-header">
            <span>TACT LVL <span id="player-lvl">1</span> <span id="save-indicator">💾 Saved</span></span>
            <span id="xp-text">0/100 XP</span>
        </div>
        <div class="xp-bar"><div id="xp-fill"></div></div>
    </div>

    <div class="dashboard">
        <div class="dash-item">CALS<br><b id="total-calories">0</b></div>
        <div class="dash-item">POWER<br><b id="stat-power">5</b></div>
        <div class="dash-item">SPEED<br><b id="stat-speed">1.0s</b></div>
        <div class="dash-item">IDLE<br><b id="stat-multi">x1.0</b></div>
    </div>

    <div class="auto-panel">
        <button id="auto-jaw-btn" class="auto-btn" onclick="handleAutoJaw()">HIRE COACH<br><span>Auto-buys Jaw Power</span></button>
        <button id="auto-food-btn" class="auto-btn" onclick="handleAutoFood()">HIRE MGRS<br><span>Levels up dishes</span></button>
    </div>

    <div class="global-upgrades">
        <button id="jaw-btn" style="color:#ffcc00; border-color:#ffcc00;" onclick="buyGlobalJaw(true)">TRAIN JAW (+5)<br>Cost: <span id="g-jaw-cost">50</span></button>
        <button id="rb-btn" style="color:#00bfff; border-color:#00bfff;" onclick="buyGlobalSpeed(true)">REDBULL (-0.1s)<br>Cost: <span id="g-speed-cost">500</span></button>
    </div>

    <div class="food-grid" id="food-container"></div>
    <button class="footer-btn" onclick="toggleStats()">📊 VIEW PROGRESS STATS</button>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        let calories = 0, globalPower = 5, globalInterval = 1000;
        let gJawCost = 50, gSpeedCost = 500;
        let playerLvl = 1, currentXP = 0, nextXP = 100;
        let hasCoach = false, coachActive = false, hasManagers = false, managersActive = false;
        let statsOpen = false;
        let stats = { lifetimeCals: 0, manualTaps: 0, autoBites: 0, levelUps: 0, dishCounts: [0, 0, 0, 0] };
        let rushActive = false, rushTimeLeft = 0;

        const menu = [
            { id: 0, n: "EGGS", i: "🍳", hp: 50, max: 50, r: 25, xp: 15, grad: "linear-gradient(90deg, #ffd700, #ffec8b)", lvl: 1, cost: 20 },
            { id: 1, n: "SAUSAGE", i: "🌭", hp: 250, max: 250, r: 120, xp: 50, grad: "linear-gradient(90deg, #8b4513, #a0522d)", lvl: 1, cost: 100 },
            { id: 2, n: "STEAK", i: "🥩", hp: 1500, max: 1500, r: 800, xp: 300, grad: "linear-gradient(90deg, #4d0000, #800000)", lvl: 1, cost: 500 },
            { id: 3, n: "SEAFOOD", i: "🦀", hp: 6000, max: 6000, r: 4000, xp: 1500, grad: "linear-gradient(90deg, #ff0000, #ff4500)", lvl: 1, cost: 2000 }
        ];

        // SAVE INDICATOR FUNCTION
        function flashSaveIndicator() {
            const ind = document.getElementById('save-indicator');
            ind.classList.add('saving');
            setTimeout(() => ind.classList.remove('saving'), 1500);
        }

        // SAVE & LOAD LOGIC
        function saveGame(showIndicator = true) {
            const gameData = {
                calories, globalPower, globalInterval, gJawCost, gSpeedCost,
                playerLvl, currentXP, nextXP, hasCoach, coachActive, 
                hasManagers, managersActive, stats,
                menuLevels: menu.map(m => ({lvl: m.lvl, cost: m.cost, max: m.max, r: m.r}))
            };
            localStorage.setItem('tactFeastSave', JSON.stringify(gameData));
            if(showIndicator) flashSaveIndicator();
        }

        function loadGame() {
            const savedData = localStorage.getItem('tactFeastSave');
            if (savedData) {
                const data = JSON.parse(savedData);
                calories = data.calories; globalPower = data.globalPower;
                globalInterval = data.globalInterval; gJawCost = data.gJawCost;
                gSpeedCost = data.gSpeedCost; playerLvl = data.playerLvl;
                currentXP = data.currentXP; nextXP = data.nextXP;
                hasCoach = data.hasCoach; coachActive = data.coachActive;
                hasManagers = data.hasManagers; managersActive = data.managersActive;
                stats = data.stats;
                data.menuLevels.forEach((m, i) => {
                    menu[i].lvl = m.lvl; menu[i].cost = m.cost;
                    menu[i].max = m.max; menu[i].r = m.r; menu[i].hp = m.max;
                });
                if (globalInterval < 1000) { clearInterval(loop); startLoop(); }
            }
        }

        window.hardReset = () => {
            if(confirm("Erase all progress forever?")) {
                localStorage.removeItem('tactFeastSave');
                location.reload();
            }
        }

        // AUTO-SAVE every 15 seconds
        setInterval(() => saveGame(true), 15000);

        function spawnParticle(x, y, emoji) {
            const p = document.createElement('div');
            p.className = 'click-particle'; p.innerText = emoji;
            p.style.left = x + 'px'; p.style.top = y + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 1000);
        }

        function triggerSugarRush() {
            if (rushActive) { rushTimeLeft = 10; return; } 
            rushActive = true; rushTimeLeft = 10;
            document.getElementById('game-body').classList.add('sugar-rush-active');
            document.getElementById('rush-timer').style.display = 'block';
            document.getElementById('stat-power').classList.add('rush-power-text');
            let rushInterval = setInterval(() => {
                rushTimeLeft--;
                document.getElementById('rush-sec').innerText = rushTimeLeft;
                if (rushTimeLeft <= 0) {
                    clearInterval(rushInterval); rushActive = false;
                    document.getElementById('game-body').classList.remove('sugar-rush-active');
                    document.getElementById('rush-timer').style.display = 'none';
                    document.getElementById('stat-power').classList.remove('rush-power-text');
                    draw();
                }
            }, 1000);
        }

        window.toggleStats = () => {
            const modal = document.getElementById('stats-modal');
            statsOpen = !statsOpen; modal.style.display = statsOpen ? 'flex' : 'none';
            if (statsOpen) updateStatsUI();
        };

        function updateStatsUI() {
            if (!statsOpen) return;
            document.getElementById('stat-life-cals').innerText = Math.floor(stats.lifetimeCals).toLocaleString();
            document.getElementById('stat-manual-taps').innerText = stats.manualTaps.toLocaleString();
            document.getElementById('stat-auto-bites').innerText = stats.autoBites.toLocaleString();
            document.getElementById('stat-level-ups').innerText = stats.levelUps.toLocaleString();
            menu.forEach((item, i) => {
                const box = document.getElementById(`dish-stat-${i}`);
                if(box) box.innerHTML = `${item.i} ${item.n}<b>${stats.dishCounts[i].toLocaleString()}</b>`;
            });
        }

        function createEmojiBurst(emoji) {
            for (let i = 0; i < 15; i++) {
                setTimeout(() => {
                    const el = document.createElement('div'); el.className = 'floating-emoji';
                    el.innerText = emoji; el.style.left = Math.random() * 100 + 'vw';
                    el.style.animationDuration = (Math.random() * 1 + 2) + 's';
                    document.body.appendChild(el); setTimeout(() => el.remove(), 3000);
                }, i * 100);
            }
        }

        function draw() {
            document.getElementById('total-calories').innerText = Math.floor(calories).toLocaleString();
            let displayPower = rushActive ? globalPower * 5 : globalPower;
            document.getElementById('stat-power').innerText = displayPower.toLocaleString();
            document.getElementById('stat-speed').innerText = (globalInterval / 1000).toFixed(1) + "s";
            document.getElementById('stat-multi').innerText = "x" + (1 + (playerLvl * 0.1)).toFixed(1);
            document.getElementById('g-jaw-cost').innerText = gJawCost.toLocaleString();
            document.getElementById('g-speed-cost').innerText = gSpeedCost.toLocaleString();
            document.getElementById('player-lvl').innerText = playerLvl;
            document.getElementById('xp-text').innerText = `${currentXP}/${nextXP} XP`;
            document.getElementById('xp-fill').style.width = (currentXP / nextXP * 100) + "%";
            
            const jB = document.getElementById('jaw-btn');
            jB.disabled = (calories < gJawCost);
            const rB = document.getElementById('rb-btn');
            rB.disabled = (calories < gSpeedCost || globalInterval <= 100);

            const ajB = document.getElementById('auto-jaw-btn');
            if(!hasCoach) { ajB.disabled = (calories < 5000); ajB.innerHTML = `HIRE COACH<br><span>Cost: 5k</span>`; ajB.className = "auto-btn";}
            else { ajB.innerHTML = coachActive ? "COACH: ON" : "COACH: OFF"; ajB.className = coachActive ? "auto-btn toggle-active" : "auto-btn toggle-off"; }

            const afB = document.getElementById('auto-food-btn');
            if(!hasManagers) { afB.disabled = (calories < 10000); afB.innerHTML = `HIRE MGRS<br><span>Cost: 10k</span>`; afB.className = "auto-btn";}
            else { afB.innerHTML = managersActive ? "MGRS: ON" : "MGRS: OFF"; afB.className = managersActive ? "auto-btn toggle-active" : "auto-btn toggle-off"; }

            menu.forEach((item, i) => {
                document.getElementById(`fill-${i}`).style.width = Math.max(0, (item.hp/item.max)*100) + "%";
                document.getElementById(`hp-text-${i}`).innerText = Math.ceil(item.hp).toLocaleString() + " HP";
                document.getElementById(`reward-${i}`).innerText = "+" + Math.floor(item.r).toLocaleString();
                document.getElementById(`cost-${i}`).innerText = item.cost.toLocaleString();
                document.getElementById(`lvl-disp-${i}`).innerText = "L." + item.lvl;
                document.getElementById(`up-btn-${i}`).disabled = (calories < item.cost);
            });
            if (statsOpen) updateStatsUI();
        }

        window.processEat = (index, isManual, event) => {
            let item = menu[index];
            let baseDmg = isManual ? (globalPower * 2.5) : (globalPower * (1 + (playerLvl * 0.1)));
            let dmg = rushActive ? baseDmg * 5 : baseDmg;
            if(isManual) { stats.manualTaps++; if(event) spawnParticle(event.clientX, event.clientY, item.i); }
            else { stats.autoBites++; }
            item.hp -= dmg;
            if (item.hp <= 0) {
                calories += item.r; stats.lifetimeCals += item.r; stats.dishCounts[index]++;
                currentXP += item.xp;
                if (Math.random() < 0.05) triggerSugarRush();
                if (currentXP >= nextXP) { currentXP -= nextXP; playerLvl++; stats.levelUps++; nextXP = Math.floor(nextXP * 1.6); }
                item.hp = item.max;
            }
            draw();
        }

        window.buyGlobalJaw = (manual) => {
            if (calories >= gJawCost) { calories -= gJawCost; globalPower += (globalPower >= 100 ? 10 : 5); gJawCost = Math.floor(gJawCost * 1.7); draw(); saveGame(manual); }
            else if(manual) { document.getElementById('alert-popup').style.display = 'block'; setTimeout(() => document.getElementById('alert-popup').style.display = 'none', 1200); }
        };

        window.upgradeDish = (index, manual) => {
            let item = menu[index];
            if (calories >= item.cost) { 
                calories -= item.cost; item.lvl++; item.r *= 1.45; item.max *= 1.25; item.hp = item.max; item.cost = Math.floor(item.cost * 1.85); 
                if (item.lvl % 5 === 0) createEmojiBurst(item.i);
                draw(); saveGame(manual);
            }
        };

        window.handleAutoJaw = () => { if(!hasCoach && calories >= 5000) { calories -= 5000; hasCoach = true; coachActive = true; draw(); saveGame(true); } else if(hasCoach) { coachActive = !coachActive; draw(); saveGame(true); } };
        window.handleAutoFood = () => { if(!hasManagers && calories >= 10000) { calories -= 10000; hasManagers = true; managersActive = true; draw(); saveGame(true); } else if(hasManagers) { managersActive = !managersActive; draw(); saveGame(true); } };
        window.buyGlobalSpeed = (m) => { if (calories >= gSpeedCost && globalInterval > 100) { calories -= gSpeedCost; globalInterval -= 100; gSpeedCost *= 3; clearInterval(loop); startLoop(); draw(); saveGame(m); } };

        let loop;
        function startLoop() { loop = setInterval(() => { menu.forEach((_, i) => processEat(i, false)); if(hasCoach && coachActive && calories >= gJawCost) buyGlobalJaw(false); if(hasManagers && managersActive) menu.forEach((item, i) => { if(calories >= item.cost) upgradeDish(i, false); }); }, globalInterval); }

        const container = document.getElementById('food-container');
        menu.forEach((item, i) => {
            const card = document.createElement('div'); card.className = 'food-card';
            card.innerHTML = `<div class="food-header"><span>${item.i} ${item.n} <span id="lvl-disp-${i}">L.1</span></span></div>
                <div class="hp-bar" onclick="processEat(${i}, true, event)"><div class="hp-fill" id="fill-${i}" style="background: ${item.grad}"></div>
                <div class="reward-overlay"><span class="reward-val" id="reward-${i}">+0</span><span class="hp-num" id="hp-text-${i}">0 HP</span></div></div>
                <button id="up-btn-${i}" class="dish-up-btn" onclick="upgradeDish(${i}, true)">UP: <span id="cost-${i}">0</span></button>`;
            container.appendChild(card);
        });
        
        loadGame();
        startLoop(); 
        draw();
    });
</script>
</body>
</html>
