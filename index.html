<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tact's Idle Feast: GUI 2.1</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        :root {
            --neon-gold: #ffcc00; --neon-blue: #00bfff; --neon-green: #00ff00;
            --neon-teal: #00ffcc; --neon-pink: #ff00ff; --panel-bg: #2d2d2d;
        }

        body { background-color: #1a1a1a; color: #eee; font-family: 'Courier New', Courier, monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
        
        .game-container { 
            background: var(--panel-bg); padding: 12px; border-radius: 15px; width: 380px; 
            text-align: center; border: 3px solid #444; display: flex; flex-direction: column; gap: 8px; 
            position: relative; animation: containerGlow 4s infinite; 
        }
        @keyframes containerGlow { 0%, 100% { border-color: #444; } 50% { border-color: var(--neon-teal); } }

        /* STATUS & XP */
        .status-bar { min-height: 18px; font-weight: bold; font-size: 11px; }
        #rush-timer { color: var(--neon-pink); animation: blink 0.5s infinite; display: none; }
        #cooldown-timer { color: #888; display: none; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .xp-section { background: #111; padding: 6px; border-radius: 8px; border: 1px solid #333; }
        .xp-info { display: flex; justify-content: space-between; font-size: 11px; color: var(--neon-teal); margin-bottom: 4px; }
        .xp-track { width: 100%; height: 10px; background: #000; border-radius: 5px; overflow: hidden; border: 1px solid #444; }
        #xp-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #0066ff, var(--neon-teal)); transition: width 0.3s; }

        /* DASHBOARD */
        .stats-dash { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; background: #111; padding: 8px; border-radius: 8px; border: 1px solid #555; }
        .dash-cell { font-size: 8px; color: #888; text-align: left; }
        .dash-cell b { display: block; color: var(--neon-gold); font-size: 10px; }

        /* BUTTON SYSTEM */
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .u-btn { 
            background: #222; border: 2px solid #444; border-radius: 6px;
            font-family: inherit; font-weight: bold; font-size: 10px; height: 48px; 
            cursor: pointer; transition: 0.2s all; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; line-height: 1.3;
        }

        /* DIMMED BUT COLORED (Image 2 logic) */
        .u-btn.gold { border-color: rgba(255, 204, 0, 0.25); color: rgba(255, 204, 0, 0.5); }
        .u-btn.blue { border-color: rgba(0, 191, 255, 0.25); color: rgba(0, 191, 255, 0.5); }
        .u-btn.green { border-color: rgba(0, 255, 0, 0.25); color: rgba(0, 255, 0, 0.5); }

        /* ACTIVE GLOW */
        .u-btn.gold.active { border-color: var(--neon-gold); color: var(--neon-gold); box-shadow: 0 0 10px rgba(255,204,0,0.4); }
        .u-btn.blue.active { border-color: var(--neon-blue); color: var(--neon-blue); box-shadow: 0 0 10px rgba(0,191,255,0.4); }
        .u-btn.green.active { border-color: var(--neon-green); color: var(--neon-green); box-shadow: 0 0 10px rgba(0,255,0,0.4); }

        /* TOGGLE COLORS */
        .toggle-on { background: var(--neon-green) !important; color: #000 !important; border-color: #fff !important; }
        .toggle-off { background: #442222 !important; color: #ffaaaa !important; border-color: #ff5555 !important; }
        .is-maxed { opacity: 0.5; cursor: default; border-color: #333 !important; color: #555 !important; }

        /* FOOD CARDS */
        .food-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .food-card { background: #333; padding: 8px; border-radius: 10px; border: 1px solid #444; }
        .hp-bar { width: 100%; height: 50px; background: #000; border-radius: 6px; cursor: pointer; border: 1px solid #555; overflow: hidden; position: relative; }
        .hp-fill { position: absolute; top: 0; left: 0; height: 100%; width: 100%; z-index: 1; opacity: 0.8; }
        .reward-tag { position: absolute; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; z-index: 5; pointer-events: none; color: white; font-weight: bold; text-shadow: 1px 1px 2px black; font-size: 13px; }
        .dish-up { width: 100%; margin-top: 5px; height: 32px; font-size: 9px; }

        /* STATS MODAL (Image 6 Cleanup) */
        #stats-modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); border-radius: 12px; z-index: 2000; display: none; flex-direction: column; padding: 20px; box-sizing: border-box; }
        .stat-line { display: flex; justify-content: space-between; background: #222; padding: 8px; border-radius: 6px; margin-bottom: 5px; border: 1px solid #444; font-size: 11px; }
        .stat-line b { color: var(--neon-teal); }
        .footer-btn { background: #444; color: #fff; border: none; border-radius: 6px; padding: 10px; font-size: 11px; cursor: pointer; margin-top: 5px; font-weight: bold; }

        #prestige-btn { display: none; background: linear-gradient(135deg, #ffd700, #ff8c00); color: #000; border: 2px solid #fff; box-shadow: 0 0 15px #ffd700; height: 35px; margin-bottom: 5px; font-size: 11px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .click-particle { position: fixed; font-size: 20px; pointer-events: none; z-index: 10000; animation: particleFloat 1s ease-out forwards; }
        @keyframes particleFloat { 0% { transform: translate(-50%, -50%) scale(1); opacity: 1; } 100% { transform: translate(-50%, -120px) scale(1.4) rotate(20deg); opacity: 0; } }
    </style>
</head>
<body>

<div class="game-container">
    <div class="status-bar">
        <div id="rush-timer">🍭 SUGAR RUSH: <span id="rush-sec">10</span>s</div>
        <div id="cooldown-timer">⏳ TACT IS FULL: <span id="cd-sec">30</span>s</div>
    </div>

    <button id="prestige-btn" onclick="prestige()">🔱 PRESTIGE: ASCEND FOR 1 GOLDEN FORK</button>

    <div class="xp-section">
        <div class="xp-info">
            <span>LVL <span id="player-lvl">1</span> <span id="save-indicator" style="opacity:0; color:var(--neon-teal);">💾 Saved</span></span>
            <span id="xp-text">0/100</span>
        </div>
        <div class="xp-track"><div id="xp-fill"></div></div>
    </div>

    <div class="stats-dash">
        <div class="dash-cell">CALS<br><b id="total-calories">0</b></div>
        <div class="dash-cell">POWER<br><b id="stat-power">5</b></div>
        <div class="dash-cell">FORKS<br><b id="stat-forks">0</b></div>
        <div class="dash-cell">SPEED<br><b id="stat-speed">1.0s</b></div>
        <div class="dash-cell">IDLE<br><b id="stat-multi">x1.1</b></div>
    </div>

    <div class="btn-grid">
        <button id="auto-jaw-btn" class="u-btn green" onclick="handleAutoJaw()">HIRE COACH<br>(5k)</button>
        <button id="auto-food-btn" class="u-btn green" onclick="handleAutoFood()">HIRE MGRS<br>(10k)</button>
    </div>

    <div class="btn-grid">
        <button id="jaw-btn" class="u-btn gold" onclick="buyGlobalJaw(true)">TRAIN JAW (+5)<br><span id="g-jaw-cost">Cost: 50</span></button>
        <button id="rb-btn" class="u-btn blue" onclick="buyGlobalSpeed(true)">REDBULL (-0.1s)<br><span id="g-speed-cost">Cost: 500</span></button>
    </div>

    <div class="food-grid" id="food-container"></div>
    <button class="footer-btn" onclick="toggleStats()">📊 VIEW PROGRESS STATS</button>

    <div id="stats-modal">
        <h2 style="color:var(--neon-teal); font-size:16px; margin:0 0 15px 0;">📊 LIVE STATS</h2>
        <div id="main-stats-area"></div>
        <h3 style="color:var(--neon-gold); font-size:12px; margin: 15px 0 10px 0;">DISHES FINISHED:</h3>
        <div id="dish-stats-area" style="display:grid; grid-template-columns:1fr 1fr; gap:5px;"></div>
        
        <button class="footer-btn" style="margin-top:20px; color:#ff5555; font-size:9px;" onclick="hardReset()">⚠️ HARD RESET SAVE</button>
        <button class="footer-btn" style="margin-top:auto; height:45px; background:var(--neon-teal); color:#000;" onclick="toggleStats()">CLOSE MENU</button>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        let calories = 0, globalPower = 5, globalInterval = 1000, gJawCost = 50, gSpeedCost = 500;
        let playerLvl = 1, currentXP = 0, nextXP = 100, goldenForks = 0, statsOpen = false;
        let hasCoach = false, coachActive = false, hasManagers = false, managersActive = false;
        let stats = { lifetimeCals: 0, manualTaps: 0, autoBites: 0, dishCounts: [0, 0, 0, 0] };
        let rushActive = false, onCooldown = false;

        const menu = [
            { id: 0, n: "EGGS", i: "🍳", hp: 50, max: 50, r: 25, xp: 15, grad: "linear-gradient(90deg, #ffd700, #ffec8b)", lvl: 1, cost: 20 },
            { id: 1, n: "SAUSAGE", i: "🌭", hp: 250, max: 250, r: 120, xp: 50, grad: "linear-gradient(90deg, #8b4513, #a0522d)", lvl: 1, cost: 100 },
            { id: 2, n: "STEAK", i: "🥩", hp: 1500, max: 1500, r: 800, xp: 300, grad: "linear-gradient(90deg, #4d0000, #800000)", lvl: 1, cost: 500 },
            { id: 3, n: "SEAFOOD", i: "🦀", hp: 6000, max: 6000, r: 4000, xp: 1500, grad: "linear-gradient(90deg, #ff0000, #ff4500)", lvl: 1, cost: 2000 }
        ];

        function formatNum(num) {
            if (num < 1000000) return Math.floor(num).toLocaleString();
            const units = ["M", "B", "T", "Qa"];
            let unitIdx = -1, val = num / 1000000;
            while (val >= 1000 && unitIdx < units.length - 1) { val /= 1000; unitIdx++; }
            return val.toFixed(2) + (unitIdx === -1 ? "M" : units[unitIdx]);
        }

        function draw() {
            document.getElementById('total-calories').innerText = formatNum(calories);
            document.getElementById('stat-power').innerText = formatNum(rushActive ? globalPower * 5 : globalPower);
            document.getElementById('stat-forks').innerText = goldenForks;
            document.getElementById('stat-speed').innerText = (globalInterval / 1000).toFixed(1) + "s";
            document.getElementById('stat-multi').innerText = "x" + (1 + (playerLvl * 0.1)).toFixed(1);
            
            document.getElementById('prestige-btn').style.display = (playerLvl >= 50) ? 'block' : 'none';

            // Upgrade Buttons
            const jB = document.getElementById('jaw-btn');
            document.getElementById('g-jaw-cost').innerText = "Cost: " + formatNum(gJawCost);
            jB.classList.toggle('active', calories >= gJawCost);

            const rB = document.getElementById('rb-btn');
            if (globalInterval <= 100) { rB.innerHTML = "MAXED OUT<br>0.1s Reached"; rB.className = "u-btn blue is-maxed"; rB.disabled = true; }
            else { 
                document.getElementById('g-speed-cost').innerText = "Cost: " + formatNum(gSpeedCost);
                rB.classList.toggle('active', calories >= gSpeedCost);
                rB.disabled = (calories < gSpeedCost);
            }

            // Coach/Managers
            const ajB = document.getElementById('auto-jaw-btn');
            if(!hasCoach) { ajB.innerHTML = `HIRE COACH<br>(${formatNum(5000)})`; ajB.classList.toggle('active', calories >= 5000); }
            else { ajB.innerHTML = coachActive ? "COACH: ON" : "COACH: OFF"; ajB.className = "u-btn green " + (coachActive ? "toggle-on" : "toggle-off"); }

            const afB = document.getElementById('auto-food-btn');
            if(!hasManagers) { afB.innerHTML = `HIRE MGRS<br>(${formatNum(10000)})`; afB.classList.toggle('active', calories >= 10000); }
            else { afB.innerHTML = managersActive ? "MGRS: ON" : "MGRS: OFF"; afB.className = "u-btn green " + (managersActive ? "toggle-on" : "toggle-off"); }

            // XP
            document.getElementById('player-lvl').innerText = playerLvl;
            document.getElementById('xp-text').innerText = Math.floor(currentXP).toLocaleString() + "/" + Math.floor(nextXP).toLocaleString();
            document.getElementById('xp-fill').style.width = Math.min(100, (currentXP/nextXP)*100) + "%";

            // Food Cards
            menu.forEach((item, i) => {
                document.getElementById(`fill-${i}`).style.width = (item.hp/item.max)*100 + "%";
                document.getElementById(`reward-${i}`).innerText = "+" + formatNum(item.r * (Math.pow(2, goldenForks)));
                const upBtn = document.getElementById(`up-btn-${i}`);
                upBtn.innerText = "UP: " + formatNum(item.cost);
                upBtn.classList.toggle('active', calories >= item.cost);
            });
            if(statsOpen) updateStatsUI();
        }

        window.processEat = (index, isManual, event) => {
            let item = menu[index];
            let baseDmg = (isManual ? globalPower * 2.5 : globalPower * (1 + (playerLvl * 0.1)));
            let dmg = rushActive ? baseDmg * 5 : baseDmg;

            if(isManual) { 
                stats.manualTaps++; 
                if(event) { 
                    const p = document.createElement('div'); p.className='click-particle'; p.innerText=item.i;
                    p.style.left=event.clientX+'px'; p.style.top=event.clientY+'px'; 
                    document.body.appendChild(p); setTimeout(()=>p.remove(),1000); 
                } 
            } else stats.autoBites++;
            
            item.hp -= dmg;
            if (item.hp <= 0) {
                let payout = item.r * (Math.pow(2, goldenForks));
                calories += payout; stats.lifetimeCals += payout; stats.dishCounts[index]++;
                currentXP += item.xp * (1 + (item.lvl * 0.1));
                while (currentXP >= nextXP) { currentXP -= nextXP; playerLvl++; nextXP = Math.floor(nextXP * 1.15); }
                if (!rushActive && !onCooldown && Math.random() < 0.05) triggerSugarRush();
                item.hp = item.max;
            }
            draw();
        }

        function triggerSugarRush() {
            if (rushActive || onCooldown) return;
            rushActive = true; let rushTime = 10;
            document.body.classList.add('sugar-rush-active');
            document.getElementById('rush-timer').style.display = 'block';
            let rushInterval = setInterval(() => {
                rushTime--; document.getElementById('rush-sec').innerText = rushTime;
                if (rushTime <= 0) { clearInterval(rushInterval); rushActive = false; document.body.classList.remove('sugar-rush-active'); document.getElementById('rush-timer').style.display = 'none'; startCooldown(); }
            }, 1000);
        }

        function startCooldown() {
            onCooldown = true; let cdTime = 30;
            document.getElementById('cooldown-timer').style.display = 'block';
            let cdInterval = setInterval(() => { cdTime--; document.getElementById('cd-sec').innerText = cdTime; if (cdTime <= 0) { clearInterval(cdInterval); onCooldown = false; document.getElementById('cooldown-timer').style.display = 'none'; } }, 1000);
        }

        function saveGame() {
            const data = { calories, globalPower, globalInterval, gJawCost, gSpeedCost, playerLvl, currentXP, nextXP, goldenForks, hasCoach, coachActive, hasManagers, managersActive, stats, menu: menu.map(m=>({lvl:m.lvl, cost:m.cost, max:m.max, r:m.r})) };
            localStorage.setItem('tactFeastSave', JSON.stringify(data));
            const ind = document.getElementById('save-indicator'); ind.style.opacity = 1; setTimeout(()=>ind.style.opacity=0, 1500);
        }

        function loadGame() {
            const saved = localStorage.getItem('tactFeastSave');
            if (saved) {
                const d = JSON.parse(saved); 
                calories = d.calories; globalPower = d.globalPower; globalInterval = d.globalInterval; gJawCost = d.gJawCost; gSpeedCost = d.gSpeedCost; 
                playerLvl = d.playerLvl; currentXP = d.currentXP; nextXP = d.nextXP; goldenForks = d.goldenForks || 0; 
                hasCoach = d.hasCoach; coachActive = d.coachActive; hasManagers = d.hasManagers; managersActive = d.managersActive; stats = d.stats;
                d.menu.forEach((m, i) => { menu[i].lvl = m.lvl; menu[i].cost = m.cost; menu[i].max = m.max; menu[i].r = m.r; menu[i].hp = m.max; });
                if (globalInterval < 1000) { clearInterval(loop); startLoop(); }
            }
        }

        window.buyGlobalJaw = (m) => { if (calories >= gJawCost) { calories -= gJawCost; globalPower += 5; gJawCost = Math.floor(gJawCost * 1.7); draw(); saveGame(); } };
        window.buyGlobalSpeed = (m) => { if (calories >= gSpeedCost && globalInterval > 100) { calories -= gSpeedCost; globalInterval -= 100; gSpeedCost *= 3; clearInterval(loop); startLoop(); draw(); saveGame(); } };
        window.upgradeDish = (i, m) => { let item = menu[i]; if (calories >= item.cost) { calories -= item.cost; item.lvl++; item.r *= 1.45; item.max *= 1.25; item.hp = item.max; item.cost *= 1.85; draw(); saveGame(); } };
        window.handleAutoJaw = () => { if(!hasCoach && calories >= 5000) { calories -= 5000; hasCoach = true; coachActive = true; draw(); saveGame(); } else if(hasCoach) { coachActive = !coachActive; draw(); } };
        window.handleAutoFood = () => { if(!hasManagers && calories >= 10000) { calories -= 10000; hasManagers = true; managersActive = true; draw(); saveGame(); } else if(hasManagers) { managersActive = !managersActive; draw(); } };

        window.toggleStats = () => { statsOpen = !statsOpen; document.getElementById('stats-modal').style.display = statsOpen ? 'flex' : 'none'; if(statsOpen) updateStatsUI(); };
        function updateStatsUI() {
            document.getElementById('main-stats-area').innerHTML = `
                <div class="stat-line"><span>MANUAL TAPS</span><b>${formatNum(stats.manualTaps)}</b></div>
                <div class="stat-line"><span>AUTO BITES</span><b>${formatNum(stats.autoBites)}</b></div>
                <div class="stat-line"><span>LIFETIME CALORIES</span><b>${formatNum(stats.lifetimeCals)}</b></div>
                <div class="stat-line"><span>GOLDEN FORKS</span><b>${goldenForks}</b></div>`;
            const dArea = document.getElementById('dish-stats-area'); dArea.innerHTML = '';
            menu.forEach((item, i) => { dArea.innerHTML += `<div class="stat-line" style="font-size:9px;">${item.i} <b>${formatNum(stats.dishCounts[i])}</b></div>`; });
        }

        window.hardReset = () => { if(confirm("PERMANENTLY WIPE SAVE?")) { localStorage.removeItem('tactFeastSave'); location.reload(); } };
        window.prestige = () => { if(confirm("Prestige? (2x Multiplier Forever)")) { goldenForks++; calories = 0; globalPower = 10; playerLvl = 1; localStorage.removeItem('tactFeastSave'); saveGame(); location.reload(); } };

        let loop;
        function startLoop() { loop = setInterval(() => { menu.forEach((_, i) => processEat(i, false)); if(hasCoach && coachActive && calories >= gJawCost) buyGlobalJaw(false); if(hasManagers && managersActive) menu.forEach((item, i) => { if(calories >= item.cost) upgradeDish(i, false); }); }, globalInterval); }

        const container = document.getElementById('food-container');
        menu.forEach((item, i) => {
            container.innerHTML += `<div class="food-card">
                <div style="font-size:9px; font-weight:bold; margin-bottom:3px; text-align:left;">${item.i} ${item.n}</div>
                <div class="hp-bar" onclick="processEat(${i}, true, event)"><div class="hp-fill" id="fill-${i}" style="background:${item.grad}"></div>
                <div class="reward-tag" id="reward-${i}">+0</div></div>
                <button id="up-btn-${i}" class="u-btn green dish-up" onclick="upgradeDish(${i}, true)">UP</button></div>`;
        });

        loadGame(); startLoop(); draw();
        setInterval(saveGame, 15000);
    });
</script>
</body>
</html>
